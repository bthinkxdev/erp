<div class="px-5 py-4">
    <div class="text-center pb-4 mb-4 border-b border-slate-100">
        <p class="text-xs text-slate-500 font-medium uppercase tracking-wide mb-1">Week {{ week_number }}</p>
        <p class="text-3xl font-bold text-slate-900 tabular-nums">₹{{ week_total|default:"0.00" }}</p>
    </div>

    <form hx-get="{% url 'reports:htmx-week' %}"
          hx-target="#week-box"
          hx-trigger="change"
          hx-swap="innerHTML"
          class="space-y-2">
        <label class="block text-xs font-medium text-slate-500 mb-1">Change Week</label>
        <div class="flex gap-2">
            <input type="number"
                   name="week"
                   min="1"
                   max="52"
                   value="{{ week_number }}"
                   class="flex-1 px-3 py-2 text-sm border border-slate-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent transition"
                   placeholder="Week #"/>
            <button type="submit"
                    class="px-3 py-2 bg-indigo-600 hover:bg-indigo-700 text-white text-sm font-medium rounded-lg transition-colors">
                Go
            </button>
        </div>
    </form>

    <div class="mt-3 pt-3 border-t border-slate-100 text-center">
        <a href="{% url 'reports:analytics' %}"
           class="text-xs text-indigo-600 hover:text-indigo-700 font-medium transition-colors">
            Full analytics →
        </a>
    </div>
</div>

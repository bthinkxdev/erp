{% if today_total %}
<div class="px-5 py-4">
    <div class="flex items-center justify-between pb-4 border-b border-slate-100 mb-4">
        <div>
            <p class="text-xs text-slate-500 font-medium uppercase tracking-wide">Total collected today</p>
            <p class="text-3xl font-bold text-slate-900 tabular-nums mt-1">₹{{ today_total }}</p>
        </div>
        <div class="text-right">
            <p class="text-xs text-slate-400">{{ today|date:"l" }}</p>
            <p class="text-sm font-medium text-slate-600 mt-0.5">{{ today|date:"d M Y" }}</p>
        </div>
    </div>

    <div id="today-kpi-value" hx-swap-oob="true">
        <span class="text-2xl font-bold text-slate-900 tabular-nums">₹{{ today_total }}</span>
    </div>

    <div class="text-center py-4">
        <a href="{% url 'collections:list' %}"
           class="inline-flex items-center gap-2 text-sm text-indigo-600 hover:text-indigo-700 font-medium transition-colors">
            View all collections
            <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                <path stroke-linecap="round" stroke-linejoin="round" d="M9 5l7 7-7 7"/>
            </svg>
        </a>
    </div>
</div>
{% else %}
<div class="px-5 py-10 text-center">
    <div class="w-12 h-12 rounded-xl bg-slate-100 flex items-center justify-center mx-auto mb-3">
        <svg class="w-6 h-6 text-slate-400" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5">
            <path stroke-linecap="round" stroke-linejoin="round" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"/>
        </svg>
    </div>
    <p class="text-sm font-medium text-slate-700">No collections today</p>
    <p class="text-xs text-slate-400 mt-1 mb-4">Collections made today will appear here.</p>
    <a href="{% url 'collections:add' %}"
       class="inline-flex items-center gap-2 px-3.5 py-2 bg-indigo-600 hover:bg-indigo-700 text-white text-xs font-medium rounded-lg transition-colors">
        <svg class="w-3.5 h-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><path stroke-linecap="round" stroke-linejoin="round" d="M12 4v16m8-8H4"/></svg>
        Add Collection
    </a>
</div>
{% endif %}

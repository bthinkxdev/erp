<div class="mt-4">
    {% if rows %}
    <div class="overflow-x-auto rounded-lg border border-slate-200">
        <table class="w-full text-sm">
            <thead>
                <tr class="bg-slate-50 border-b border-slate-200">
                    <th class="px-4 py-2.5 text-left text-xs font-semibold text-slate-500 uppercase tracking-wide">Customer</th>
                    <th class="px-4 py-2.5 text-left text-xs font-semibold text-slate-500 uppercase tracking-wide hidden sm:table-cell">Phone</th>
                    <th class="px-4 py-2.5 text-right text-xs font-semibold text-slate-500 uppercase tracking-wide">Collections</th>
                    <th class="px-4 py-2.5 text-right text-xs font-semibold text-slate-500 uppercase tracking-wide">Total</th>
                </tr>
            </thead>
            <tbody class="divide-y divide-slate-100">
                {% for row in rows %}
                <tr class="hover:bg-slate-50/60 transition-colors">
                    <td class="px-4 py-3">
                        <span class="font-medium text-slate-800">{{ row.customer__name }}</span>
                    </td>
                    <td class="px-4 py-3 text-slate-500 hidden sm:table-cell">{{ row.customer__phone }}</td>
                    <td class="px-4 py-3 text-right text-slate-600 tabular-nums">{{ row.count|default:"0" }}</td>
                    <td class="px-4 py-3 text-right font-semibold text-slate-900 tabular-nums">₹{{ row.total|default:"0.00" }}</td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
    {% else %}
    <div class="text-center py-8 text-sm text-slate-400 border border-dashed border-slate-200 rounded-lg">
        No customer data for the selected period.
    </div>
    {% endif %}
</div>
